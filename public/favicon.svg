<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Progress Visible Studio mark: three rising bars — progress, made visible.
       Plum gradient shared with Discbound; cream tile matches the brand paper. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf6ee"/>
      <stop offset="1" stop-color="#f3ebda"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#9d5a94"/>
      <stop offset="1" stop-color="#834a7c"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#tile)"/>
  <g fill="url(#mark)">
    <rect x="24" y="56" width="14" height="22" rx="4" opacity="0.6"/>
    <rect x="43" y="42" width="14" height="36" rx="4" opacity="0.8"/>
    <rect x="62" y="24" width="14" height="54" rx="4"/>
  </g>
</svg>
